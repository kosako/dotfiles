# Private-config backup catalog: the public-safe baseline of home-relative
# paths that the private-backup tooling captures into an age-encrypted
# archive (see docs/private-backup.md, issue #60). This is the declarative
# layer only; the backup / restore scripts come in later stages.
#
# Public-safety: this file is committed to a public repo, so it may list
# only paths that are safe to disclose. Client- or host-specific paths go
# in the non-committed local supplement (~/.config/dotfiles/backup-paths.local),
# which travels inside the encrypted archive instead.
#
# Each entry:
#   path      home-relative path (required). A leading "/" or any ".." is
#             rejected, as are glob metacharacters (* ? [); the backup
#             captures exactly these paths, never a pattern.
#   type      file | dir (optional). Declares what the path is expected to
#             be so the tooling can validate and restore it correctly.
#   category  free-form public-safe label (optional), e.g. shell / ssh.
#
# Read by scripts via mikefarah/yq v4; validated by validate-policy.sh.
backup_paths:
  - { path: .zshrc.local, type: file, category: shell }
  - { path: .ssh/config.local, type: file, category: ssh }
  # Codex harness config. Contains a mix of public-safe settings and
  # machine/secret-bearing values (project paths incl. ~/work, status_line,
  # mcp env), so it is never committed; the encrypted archive carries it.
  # auth.json is intentionally excluded (1Password is the secret SoR). #78
  - { path: .codex/config.toml, type: file, category: ai-tools }
  # Git personal identity (name/email, plus user.signingkey for the SSH signer).
  # commit.gpgsign defaults off in the managed dot_gitconfig (#97); signing is
  # opt-in per repo, so this file no longer pins it on. Not chezmoi-managed —
  # identity values must not
  # enter the public repo (docs/git-identity.md) — so the encrypted archive
  # carries it, letting a new machine restore the identity instead of
  # recreating it by hand. The path itself is public-safe. (#85)
  - { path: .config/git/personal.gitconfig, type: file, category: git }
  # 1Password SSH agent config. op-ssh-sign (commit signing) and SSH auth reach
  # the key through this agent, which only serves the vaults/items listed here;
  # without it signing fails (it was the #87 gotcha). Not chezmoi-managed (it is
  # machine/1Password-state specific); the encrypted archive carries it so a new
  # machine restores the served-vault config. Path and vault names are
  # public-safe; no key material is in it. (#89)
  - { path: .config/1Password/ssh/agent.toml, type: file, category: ssh }
  # GitHub injection-guard trust list (#119). Holds the self trust basis
  # (GitHub login + numeric id) plus any opt-in trusted collaborators; it is
  # consumed by the isolated reader / safe-gh (Phase 3). Absent ⇒ fail closed
  # (only self is trusted, computed at runtime; no opt-in accounts). Identity
  # values must not enter the public repo, so it is non-committed; the
  # encrypted archive carries it. The path itself is public-safe. (#119 PR3)
  - { path: .config/dotfiles/github-trust.local, type: file, category: ai-tools }
