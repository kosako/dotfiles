profiles:
  personal:
    environmentKind: personal
    modules:
      - base
      - git-profile
      - supply-chain/git
      - supply-chain/npm
      - supply-chain/corepack
      - doctor
      - preflight
      - project-templates
      - runtime
      - shell-extra
      - vscode
      - ssh-1password
      - direnv-policy
      - gui-apps
      - update-policy
      - ai-policy
      - claude-settings
      - git-signing
    capabilities:
      installPackages: true
      installGuiApps: true
      enableMacOSDefaults: false
      enable1PasswordSSH: true
      enableGitSigning: true
      enableDirenv: true
      enableRuntimeManagement: true
      enableVsCodeSettings: false
      enableVsCodeExtensions: false
      npmHardeningMode: enforce
      corepackMode: report
      allowNetworkTunnels: true
      allowSecretsAccess: true
      enableAiTools: false
      enforceAiSandbox: false
      # #73: opt in to the report-only monitoring layer. doctor runs
      # agent-tools' status.sh (--json, read-only, contract v2) and summarizes
      # its health (clean / checks / stale / sync conflicts) as warnings. Still
      # report-only / exit 0; never clones / pulls / syncs. The checkout lives
      # at ~/dev/agent-tools (non-standard), so AGENT_TOOLS is set in the local,
      # non-tracked ~/.zshrc.local (see docs/local-overrides.md).
      enableAgentToolsStatus: true
      enableAiPolicy: true
      # Phase 2 (#119): deny the github MCP server in the managed settings.json.
      # Best-effort / steering (not an enforcement boundary; see
      # docs/ai-environment-boundary.md). No github MCP is configured today, so
      # this is harmless defense-in-depth: an MCP added later is pre-denied.
      gateGitHubMcp: true
      enableGitHubIsolatedReader: false

  work-minimal:
    environmentKind: work
    modules:
      - base
      - git-profile
      - supply-chain/git
      - supply-chain/npm
      - supply-chain/corepack
      - doctor
      - preflight
      - update-policy
      - ai-policy
    capabilities:
      installPackages: false
      installGuiApps: false
      enableMacOSDefaults: false
      enable1PasswordSSH: false
      enableGitSigning: false
      enableDirenv: false
      enableRuntimeManagement: false
      enableVsCodeSettings: false
      enableVsCodeExtensions: false
      npmHardeningMode: report
      corepackMode: report
      allowNetworkTunnels: false
      allowSecretsAccess: false
      enableAiTools: false
      enforceAiSandbox: false
      enableAgentToolsStatus: false
      enableAiPolicy: true
      gateGitHubMcp: false
      enableGitHubIsolatedReader: false

  work-dev:
    environmentKind: work
    modules:
      - base
      - git-profile
      - runtime
      - shell-extra
      - supply-chain/git
      - supply-chain/npm
      - supply-chain/corepack
      - doctor
      - preflight
      - project-templates
      - vscode
      - direnv-policy
      - update-policy
      - ai-policy
    capabilities:
      installPackages: false
      installGuiApps: false
      enableMacOSDefaults: false
      enable1PasswordSSH: false
      enableGitSigning: false
      enableDirenv: true
      enableRuntimeManagement: true
      enableVsCodeSettings: false
      enableVsCodeExtensions: false
      npmHardeningMode: report
      corepackMode: report
      allowNetworkTunnels: false
      allowSecretsAccess: false
      enableAiTools: false
      enforceAiSandbox: false
      enableAgentToolsStatus: false
      enableAiPolicy: true
      gateGitHubMcp: false
      enableGitHubIsolatedReader: false
