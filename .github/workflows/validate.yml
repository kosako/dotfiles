name: validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  YQ_VERSION: 4.53.3
  YQ_SHA256: fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4
  AGE_VERSION: 1.3.1
  AGE_SHA256: bdc69c09cbdd6cf8b1f333d372a1f58247b3a33146406333e30c0f26e8f51377

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # The policy scripts require mikefarah/yq v4. Download outside the
      # checkout so a stray file never affects the working tree.
      - name: install yq (pinned, checksum verified)
        working-directory: ${{ runner.temp }}
        run: |
          curl -fsSL -o yq "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          echo "${YQ_SHA256}  yq" | sha256sum -c -
          mkdir -p "$HOME/.local/bin"
          install -m 0755 yq "$HOME/.local/bin/yq"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # The private-backup round-trip test needs age + age-keygen. Pin and
      # checksum-verify like every other downloaded tool.
      - name: install age (pinned, checksum verified)
        working-directory: ${{ runner.temp }}
        run: |
          curl -fsSL -o age.tar.gz "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz"
          echo "${AGE_SHA256}  age.tar.gz" | sha256sum -c -
          tar -xzf age.tar.gz age/age age/age-keygen
          mkdir -p "$HOME/.local/bin"
          install -m 0755 age/age "$HOME/.local/bin/age"
          install -m 0755 age/age-keygen "$HOME/.local/bin/age-keygen"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: bash syntax check
        run: bash -n scripts/*.sh

      - name: shellcheck (warning and above)
        run: shellcheck -S warning scripts/*.sh

      - name: validate policy
        run: ./scripts/validate-policy.sh --all

      - name: policy fail-closed tests
        run: ./scripts/test-policy.sh

      - name: gitconfig safety tests
        run: ./scripts/test-gitconfig.sh

      - name: npmrc hardening tests
        run: ./scripts/test-npmrc.sh

      - name: doctor orphan tests
        run: ./scripts/test-doctor.sh

      - name: private-backup secrets-gate tests
        run: ./scripts/test-secrets-gate.sh

      - name: private-backup backup/verify tests
        run: ./scripts/test-private-backup.sh

      - name: catalog install gate tests
        run: ./scripts/test-install-packages.sh

      - name: whitespace check (committed tree)
        run: git diff --check "$(git hash-object -t tree /dev/null)" HEAD

  render:
    runs-on: ubuntu-latest
    env:
      CHEZMOI_VERSION: 2.70.5
      CHEZMOI_SHA256: 6a76a0ac3718f0d45b34b4b57067f9556f8f6042e3da710a3c496838362aca14
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # Download outside the checkout: a stray file in the source
      # directory would show up as an unexpected managed target.
      - name: install chezmoi (pinned, checksum verified)
        working-directory: ${{ runner.temp }}
        run: |
          curl -fsSL -o chezmoi.tar.gz "https://github.com/twpayne/chezmoi/releases/download/v${CHEZMOI_VERSION}/chezmoi_${CHEZMOI_VERSION}_linux_amd64.tar.gz"
          echo "${CHEZMOI_SHA256}  chezmoi.tar.gz" | sha256sum -c -
          mkdir -p "$HOME/.local/bin"
          tar -xzf chezmoi.tar.gz -C "$HOME/.local/bin" chezmoi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: install yq (pinned, checksum verified)
        working-directory: ${{ runner.temp }}
        run: |
          curl -fsSL -o yq "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          echo "${YQ_SHA256}  yq" | sha256sum -c -
          mkdir -p "$HOME/.local/bin"
          install -m 0755 yq "$HOME/.local/bin/yq"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: chezmoi render and managed-set tests
        run: ./scripts/test-render.sh

      - name: claude settings sandbox content tests
        run: ./scripts/test-claude-settings.sh

      - name: git-signing gating tests
        run: ./scripts/test-git-signing.sh

      - name: starship prompt config tests
        run: ./scripts/test-starship.sh

      - name: ssh-1password gating and safety tests
        run: ./scripts/test-ssh.sh
